name: Purge Main Page

concurrency:
  group: wiki-bot-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *' #Main Attempt
    - cron: '17 0 * * *' #Safety-net #1
    - cron: '34 0 * * *' #Safety-net #2
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pywikibot

      - uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_on: error
          command: |
            echo "('TRCDBot', BotPassword('TRCDBot_AutoPurge', '${{ secrets.BOT_PASSWORD }}'))" > passwordfile
            chmod 600 passwordfile
            python bot.py

      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lastSuccess.txt
          git commit -m "Update lastSuccess for $(date +%Y-%m-%d) [skip ci]" || echo "No changes"
          git push
