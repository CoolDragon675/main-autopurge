name: Wiki Auto-Purge Engine

on:
  schedule:
    - cron: '0 0 * * *'    # 1st Attempt: Midnight UTC
    - cron: '17 0 * * *'   # 2nd Attempt: 17-minute offset for reliability
    - cron: '37 0 * * *'   # 3rd Attempt: 37-minute offset safety net
  workflow_dispatch:       # Manual trigger button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Pywikibot
        run: pip install pywikibot

      - name: Run Bot with Auto-Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5    # Stop if the script hangs
          max_attempts: 3       # If Miraheze API lags, retry up to 3 times
          retry_on: error
          command: |
            echo "('TRCDBot', BotPassword('TRCDBot_AutoPurge', '${{ secrets.BOT_PASSWORD }}'))" > passwordfile
            chmod 600 passwordfile
            python bot.py
