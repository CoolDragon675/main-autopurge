name: Wiki Auto-Purge Engine

on:
  schedule:
    - cron: '0 0 * * *'   # Attempt 1 (Midnight UTC)
    - cron: '25 0 * * *'  # Attempt 2 (Backup/Safety Net)
  workflow_dispatch:      # Manual trigger button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Pywikibot
        run: pip install pywikibot

      - name: Run Bot with Auto-Retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5    # Stop if it takes longer than 5 mins
          max_attempts: 3       # Try up to 3 times if it fails
          retry_on: error       # Retry if the python command exits with an error
          command: |
            echo "('TRCDBot', BotPassword('TRCDBot_AutoPurge', '${{ secrets.BOT_PASSWORD }}'))" > passwordfile
            chmod 600 passwordfile
            python bot.py
